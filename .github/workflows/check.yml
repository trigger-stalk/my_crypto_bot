name: Bybit Monitor Bot

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.0  # Обновлено до версии с поддержкой Node 20/24

      - name: Set up Python
        uses: actions/setup-python@v5.0.0  # Обновлено до v5 (поддерживает Node 24)
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyTelegramBotAPI

      - name: Run Monitor Script
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          # Явно разрешаем использование Node 24 для всех экшенов в этом шаге
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
        run: python main.py

      - name: Commit and Push Market State
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add market_state.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update market state [skip ci]" && git push)
