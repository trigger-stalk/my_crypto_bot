name: Bybit Monitor Bot

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Обновлено с v3

      - name: Set up Python
        uses: actions/setup-python@v5  # Обновлено с v4
        with:
          python-version: '3.11'   # Рекомендую 3.11 для стабильности в 2026

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyTelegramBotAPI

      - name: Run Monitor Script
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          # Добавляем переменную, чтобы GitHub не ругался на старые экшены, если они затесались
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
        run: python main.py

      - name: Commit and Push Market State
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add market_state.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update market state [skip ci]" && git push)
