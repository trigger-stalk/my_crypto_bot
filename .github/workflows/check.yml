name: Bybit Monitor Bot

on:
  schedule:
    - cron: '*/5 * * * *'  # Запуск каждые 5 минут
  workflow_dispatch:      # Кнопка ручного запуска

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Важно для корректного pull/rebase

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyTelegramBotAPI

      - name: Run Monitor Script
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: python main.py

      - name: Commit and Push Market State
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Синхронизируемся с облаком, если ты что-то правил в браузере
          git pull origin main --rebase
          
          git add market_state.json
          
          # Проверка: есть ли изменения в файле данных
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update market state [skip ci]"
            git push origin main
          fi
